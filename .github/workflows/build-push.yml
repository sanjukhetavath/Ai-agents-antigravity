name: 'Build & Push to ACR'

on:
  push:
    branches: [main]
    paths: ['src/**', 'Dockerfile']

permissions:
  id-token: write
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_LOGIN_SERVER }}
          username: 00000000-0000-0000-0000-000000000000 # Dummy user for AAD auth
          password: ${{ env.ARM_OIDC_TOKEN }} # OIDC token fetched by Azure Login

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: src/ai-agent
          push: true
          tags: ${{ vars.ACR_LOGIN_SERVER }}/ai-agent:${{ github.sha }}
